version: '3.9'

services:
  cube:
    build:
      context: .
      args:
        ENVIRONMENT: local
    volumes:
      - ./chris_backend:/opt/app-root/src:z
    user: "${UID-1000}:${GID-1000}"
    userns_mode: "${USERNS_MODE-host}"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on: 
      db_migrate:
        condition: service_completed_successfully
      swift:
        condition: service_started
      queue:
        condition: service_started

  db_migrate:
    build:
      context: .
      args:
        ENVIRONMENT: local
    volumes:
      - ./chris_backend:/opt/app-root/src:z
      - pudb_config_workaround:/opt/app-root/src/.config
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
    command: python manage.py migrate --noinput --force-color
    user: "${UID-1000}:${GID-1000}"
    userns_mode: "${USERNS_MODE-host}"
    depends_on:
      db:
        condition: service_healthy
    labels:
      org.chrisproject.chris_ultron_backend: db_migrate

  worker:
    build:
      context: .
      args:
        ENVIRONMENT: local
    volumes:
      - ./chris_backend:/opt/app-root/src:z
      - pudb_config_workaround:/opt/app-root/src/.config
    user: "${UID-1000}:${GID-1000}"
    userns_mode: "${USERNS_MODE-host}"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - CELERY_RDB_HOST=0.0.0.0
      - CELERY_RDB_PORT=6900
    command: celery -A core worker -c 3 -l DEBUG -Q main1,main2
    ports:
      - "6900-6905:6900-6905"
    depends_on:
      db_migrate:
        condition: service_completed_successfully
      swift:
        condition: service_started
      queue:
        condition: service_started

  worker_periodic:
    build:
      context: .
      args:
        ENVIRONMENT: local
    volumes:
      - ./chris_backend:/opt/app-root/src:z
      - pudb_config_workaround:/opt/app-root/src/.config
    user: "${UID-1000}:${GID-1000}"
    userns_mode: "${USERNS_MODE-host}"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
    command: celery -A core worker -c 1 -l DEBUG -Q periodic
    depends_on:
      db_migrate:
        condition: service_completed_successfully
      swift:
        condition: service_started
      queue:
        condition: service_started

  scheduler:
    build:
      context: .
      args:
        ENVIRONMENT: local
    volumes:
      - ./chris_backend:/opt/app-root/src:z
      - pudb_config_workaround:/opt/app-root/src/.config
    user: "${UID-1000}:${GID-1000}"
    userns_mode: "${USERNS_MODE-host}"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      db_migrate:
        condition: service_completed_successfully
      swift:
        condition: service_started
      queue:
        condition: service_started

  db:
    image: postgres:13
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=chris_dev
      - POSTGRES_USER=chris
      - POSTGRES_PASSWORD=Chris1234
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 2s
      timeout: 4s
      retries: 3
      start_period: 60s
    labels:
      org.chrisproject.chris_ultron_backend: db

  queue:
    image: rabbitmq:3
    volumes:
      - queue_data:/var/lib/rabbitmq

  swift:
    image: docker.io/fnndsc/docker-swift-onlyone:latest
    init: true
    volumes:
      - swift_data:/srv
    environment:
      - SWIFT_USERNAME=chris:chris1234
      - SWIFT_KEY=testing
    ports:
      - "8080:8080"

  lldap:
    image: docker.io/nitnelave/lldap:stable
    ports:
      - "3890:3890"
      - "17170:17170"
    volumes:
      - "lldap_data:/data"
    environment:
      - UID=10100
      - GID=10100
      - TZ=America/New_York
      - LLDAP_JWT_SECRET=super_secret_random_string
      - LLDAP_LDAP_USER_PASS=chris1234
      - LLDAP_LDAP_BASE_DN=dc=example,dc=org

volumes:
  db_data:
  queue_data:
  swift_data:
  lldap_data:
  pudb_config_workaround:  # workaround for pudb, which wants to write files to ~/.config
